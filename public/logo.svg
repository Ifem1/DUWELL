<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- threshold backdrop -->
  <circle cx="32" cy="32" r="30" fill="#1A0E22"/>
  <!-- outer double-stamp ring (brass) -->
  <circle cx="32" cy="32" r="29" stroke="#D391B0" stroke-width="2"/>
  <circle cx="32" cy="32" r="25" stroke="#D391B0" stroke-width="1" stroke-dasharray="0.5 1.5" opacity="0.55"/>
  <!-- left half wash (move-in tenant tint) -->
  <path d="M32 7a25 25 0 0 0 0 50z" fill="#5D3C64" opacity="0.55"/>
  <!-- threshold bar — the mediator line -->
  <rect x="31" y="9" width="2" height="46" fill="#D391B0"/>
  <!-- serif D, bisected by the bar -->
  <g fill="#F3E4EC">
    <!-- left bowl of D -->
    <path d="M21 18h11v28H21z" opacity="0"/>
    <path d="M21 18h7v28h-7z"/>
    <path d="M28 18c10 0 14 6 14 14s-4 14-14 14v-4c7 0 10-4 10-10s-3-10-10-10v-4z"/>
  </g>
  <!-- tiny brass dots top/bottom of bar (stamp pin marks) -->
  <circle cx="32" cy="12" r="1.4" fill="#D391B0"/>
  <circle cx="32" cy="52" r="1.4" fill="#D391B0"/>
</svg>
